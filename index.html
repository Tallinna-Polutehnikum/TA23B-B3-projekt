<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cinema</title>

  <link rel="stylesheet" href="style.css">
<body>

  <!-- HEADER / BANNER -->
  <header>
    <div class="banner-text">
      <p>Example site</p>
      <h1>„Wowie“</h1>
      <p class="sub">Wheeew</p>
    </div>
    <div class="banner-image">
      <img src="banner-image.jpg" alt="Poster">
    </div>
  </header>

  <!-- FILTER BAR -->
  <section class="filter-bar">
    <select id="genreFilter" aria-label="Filtreeri žanri järgi">
      <option value="all">Kõik žanrid</option>
      <option value="comedy">Komöödia</option>
      <option value="documentary">Dokumentaal</option>
      <option value="music">Muusika</option>
      <option value="horror">Õudus</option>
      <option value="action">Märul</option>
      <option value="scifi">Ulme</option>
    </select>
    <button type="button">Vaata kinokava</button>
  </section>

  <!-- MAIN CONTENT -->
  <main>
<section class="hero-banner">
  <div class="slideshow-container">
    <div class="slide fade">
      <img src="assets/slide1.jpg" alt="News 1">
      <div class="slide-text">
        <h3></h3>
        <p></p>
      </div>
    </div>

    <div class="slide fade">
      <img src="assets/slide2.jpg" alt="News 2">
      <div class="slide-text">
        <h3></h3>
        <p></p>
      </div>
    </div>

    <div class="slide fade">
      <img src="assets/slide3.jpg" alt="News 3">
      <div class="slide-text">
        <h3></h3>
        <p></p>
      </div>
    </div>

    <div class="slide fade">
      <img src="assets/slide4.jpg" alt="News 4">
      <div class="slide-text">
        <h3></h3>
        <p></p>
      </div>
    </div>

    <div class="slide fade">
      <img src="assets/slide5.jpg" alt="News 5">
      <div class="slide-text">
        <h3></h3>
        <p></p>
      </div>
    </div>

    <div class="slide-dots">
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>
  </div>
</section>

    <section id="upcomingSection">
      <h2>Tulekul kinodes</h2>
      <div class="film-grid upcoming-grid" id="upcomingGrid">
        <!-- upcoming movies injected here -->
      </div>
    </section>

    <section id="nowShowing">
      <h2>Top films</h2>
      <div class="film-grid" id="filmGrid">
        <!-- now showing movies injected here -->
      </div>
    </section>
  </main>

  <!-- FOOTER -->
  <footer>
    <p>© 2025 Our Kino • Kõik õigused kaitstud</p>
  </footer>

  <script src="script.js"></script>

</body>
</html>
