<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cinema</title>

  <link rel="stylesheet" href="style.css">
<body>

  <!-- HEADER / BANNER -->
  <header>
    <div class="banner-text">
      <p>Example site</p>
      <h1>„Wowie“</h1>
      <p class="sub">Wheeew</p>
    </div>
    <div class="banner-image">
      <img src="banner-image.jpg" alt="Poster">
    </div>
  </header>

  <!-- FILTER BAR -->
  <section class="filter-bar">
    <select id="genreFilter" aria-label="Filtreeri žanri järgi">
      <option value="all">Kõik žanrid</option>
      <option value="comedy">Komöödia</option>
      <option value="documentary">Dokumentaal</option>
      <option value="music">Muusika</option>
      <option value="horror">Õudus</option>
      <option value="action">Märul</option>
      <option value="scifi">Ulme</option>
    </select>
    <button type="button">Vaata kinokava</button>
  </section>

  <!-- MAIN CONTENT -->
  <main>
<section class="hero-banner">
  <img src="add.jpg" alt="Hero banner">
</section>


    <h2>Top films</h2>
    <div class="film-grid">


      <!-- Film 1 -->
      <a class="film-link" href="movie.html?id=1" aria-label="Elnar Monkey details" data-genre="comedy">
        <div class="film">
          <img src="uus-raha.jpg" alt="Elnar Monkey">
          <div class="film-info">
            <h3>Elnar Monkey</h3>
            <p>Komöödia • USA</p>
          </div>
        </div>
      </a>


      <!-- Film 2 -->
      <a class="film-link" href="movie.html?id=2" aria-label="Artur Monkey details" data-genre="documentary,music">
        <div class="film">
          <img src="depeche-mode-m.jpg" alt="DEPECHE MODE: M">
          <div class="film-info">
            <h3>Artur Monkey</h3>
            <p>Dokumentaal • Muusika</p>
          </div>
        </div>
      </a>

      <!-- Film 3 -->
      <a class="film-link" href="movie.html?id=3" aria-label="Sofja details" data-genre="horror">
        <div class="film">
          <img src="must-telefon-2.jpg" alt="Sofja">
          <div class="film-info">
            <h3>Sofja</h3>
            <p>Õudus • USA</p>
          </div>
        </div>
      </a>


      <!-- Film 4 -->
      <a class="film-link" href="movie.html?id=4" aria-label="Venom 3 details" data-genre="action,scifi">
        <div class="film">
          <img src="venom-3.jpg" alt="Venom 3: The Last Dance">
          <div class="film-info">
            <h3>Venom 3: The Last Dance</h3>
            <p>Märul • Ulme</p>
          </div>
        </div>
      </a>

    </div>
  </main>

  <!-- FOOTER -->
  <footer>
    <p>© 2025 Our Kino • Kõik õigused kaitstud</p>
  </footer>

  <script src="script.js"></script>

</body>
</html>
