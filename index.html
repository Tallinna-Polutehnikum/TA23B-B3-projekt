<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cinema</title>

  <style>
    /* === GLOBAL STYLES === */
    body {
      font-family: "Poppins", "Arial", sans-serif;
      margin: 0;
      background-color: #fff;
      color: #111;
      overflow-x: hidden;
    }

    h1, h2, h3, h4, p {
      margin: 0;
    }

    img {
      display: block;
      width: 100%;
      height: auto;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    /* === HEADER / BANNER === */
    header {
      background: linear-gradient(to right, #f7f7f7, #ffffff);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 3rem 6%;
      flex-wrap: wrap;
    }

    .banner-text {
      flex: 1;
      min-width: 280px;
      padding-right: 2rem;
    }

    .banner-text p {
      color: #555;
      font-size: 1.1rem;
    }

    .banner-text h1 {
      font-size: 3rem;
      font-weight: 700;
      margin: 0.4rem 0 1rem;
      line-height: 1.2;
    }

    .banner-text .sub {
      font-size: 1.1rem;
      color: #444;
    }

    .banner-image {
      flex: 1;
      min-width: 280px;
    }

    .banner-image img {
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.15);
    }

    /* === FILTER BAR === */
    .filter-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 1rem;
      background-color: #111;
      padding: 1.5rem;
      flex-wrap: wrap;
    }

    .filter-bar select {
      padding: 0.8rem 1rem;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      background-color: #f5f5f5;
    }

    .filter-bar button {
      background-color: #f97316;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 0.8rem 1.5rem;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.3s;
    }

    .filter-bar button:hover {
      background-color: #ea580c;
    }

    /* === MAIN SECTION === */
    main {
      padding: 3rem 6%;
    }

    main h2 {
      font-size: 2rem;
      margin-bottom: 1.5rem;
    }

    .film-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(270px, 1fr));
      gap: 1.5rem;
    }

    /* === FILM CARD === */
    .film {
      background-color: #f9f9f9;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .film:hover {
      transform: translateY(-6px);
      box-shadow: 0 6px 15px rgba(0,0,0,0.15);
    }

    .film img {
      height: 200px;
      object-fit: cover;
    }

    .film-info {
      padding: 1rem 1.2rem 1.5rem;
    }

    .film-info h3 {
      font-size: 1.3rem;
      margin-bottom: 0.4rem;
      color: #111;
    }

    .film-info p {
      color: #666;
      font-size: 0.95rem;
    }

    .rating {
      position: absolute;
      top: 10px;
      right: 10px;
      background-color: #111;
      color: #fff;
      padding: 0.3rem 0.6rem;
      border-radius: 4px;
      font-size: 0.8rem;
    }

    /* === FOOTER === */
    footer {
      background-color: #111;
      color: #eee;
      padding: 2rem 6%;
      text-align: center;
      margin-top: 3rem;
    }

    footer p {
      font-size: 0.9rem;
      color: #aaa;
    }

    /* === RESPONSIVE === */
    @media (max-width: 768px) {
      .banner-text h1 {
        font-size: 2.2rem;
      }

      .banner-text p {
        font-size: 1rem;
      }

      header {
        flex-direction: column;
        text-align: center;
      }

      .banner-text {
        padding-right: 0;
        margin-bottom: 2rem;
      }
    }
  </style>
</head>
<body>

  <!-- HEADER / BANNER -->
  <header>
    <div class="banner-text">
      <p>Example site</p>
      <h1>„Wowie“</h1>
      <p class="sub">Wheeew</p>
    </div>
    <div class="banner-image">
      <img src="banner-image.jpg" alt="Poster">
    </div>
  </header>

  <!-- FILTER BAR -->
  <section class="filter-bar">
    <select aria-label="Vali näitamine">
      <option>Example 1</option>
      <option>Example 2</option>
      <option>Example 3</option>
      <option>Example 4</option>
    </select>
    <button type="button">Vaata kinokava</button>
  </section>

  <!-- MAIN CONTENT -->
  <main>
    <h2>Top films</h2>
    <div class="film-grid">


      <!-- Film 1 -->
      <a class="film-link" href="movie.html?id=1" aria-label="Elnar Monkey details">
        <div class="film">
          <img src="uus-raha.jpg" alt="Elnar Monkey">
          <div class="film-info">
            <h3>Elnar Monkey</h3>
            <p>Komöödia • USA</p>
          </div>
        </div>
      </a>


      <!-- Film 2 -->
      <a class="film-link" href="movie.html?id=2" aria-label="Artur Monkey details">
        <div class="film">
          <img src="depeche-mode-m.jpg" alt="Artur Monkey">
          <div class="film-info">
            <h3>Artur Monkey</h3>
            <p>Dokumentaal • Muusika</p>
          </div>
        </div>
      </a>


      <!-- Film 3 -->
      <a class="film-link" href="movie.html?id=3" aria-label="Sofja details">
        <div class="film">
          <img src="must-telefon-2.jpg" alt="Sofja">
          <div class="film-info">
            <h3>Sofja</h3>
            <p>Õudus • USA</p>
          </div>
        </div>
      </a>


      <!-- Film 4 -->
      <a class="film-link" href="movie.html?id=4" aria-label="Venom 3 details">
        <div class="film">
          <img src="venom-3.jpg" alt="Venom 3: The Last Dance">
          <div class="film-info">
            <h3>Venom 3: The Last Dance</h3>
            <p>Märul • Ulme</p>
          </div>
        </div>
      </a>

    </div>
  </main>

  <!-- FOOTER -->
  <footer>
    <p>© 2025 Our Kino • Kõik õigused kaitstud</p>
  </footer>

  <script>
    // Example JS: handle dropdown selection (for demo)
    (function(){
      const select = document.querySelector('select');
      if (!select) return;
      select.addEventListener('change', ()=>{
        try{ window.alert('Valitud kino: ' + select.value); } catch(e){ console.log('Valitud kino:', select.value); }
      });
    })();
  </script>

</body>
</html>
