name: CI

on:
  push:
  pull_request:

jobs:
  web:
    name: Web CI (${{ matrix.project }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: [main-site, admin-worker-site]
    defaults:
      run:
        shell: bash
        working-directory: ${{ matrix.project }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ${{ matrix.project }}/package-lock.json

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Detect scripts
        id: meta
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const scripts = pkg.scripts || {};
          const outputs = { lint: !!scripts.lint, test: !!scripts.test, build: !!scripts.build };
          for (const [key, val] of Object.entries(outputs)) {
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `${key}=${val}\n`);
            console.log(`${key}: ${val}`);
          }
          NODE

      - name: Lint
        run: |
          if [ "${{ steps.meta.outputs.lint }}" = "true" ]; then
            npm run lint
          else
            npx eslint .
          fi

      - name: Test with coverage
        if: steps.meta.outputs.test == 'true'
        run: npm test -- --coverage

      - name: Enforce coverage threshold
        if: steps.meta.outputs.test == 'true'
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const path = 'coverage/coverage-summary.json';
          if (!fs.existsSync(path)) {
            console.error('Coverage summary not found');
            process.exit(1);
          }
          const data = JSON.parse(fs.readFileSync(path));
          const pct = data.total?.statements?.pct ?? data.total?.lines?.pct ?? 0;
          if (pct < 70) {
            console.error(`Coverage too low: ${pct}% < 70%`);
            process.exit(1);
          }
          console.log(`Coverage OK: ${pct}% >= 70%`);
          NODE

      - name: Build
        if: steps.meta.outputs.build == 'true'
        run: npm run build

      - name: Preview deployment (PR only)
        if: github.event_name == 'pull_request'
        run: echo "Preview: https://preview-${{ github.head_ref }}.example.com"

      - name: Email notification on failure
        if: failure()
        run: echo "Sending email: CI/CD pipeline failed"
