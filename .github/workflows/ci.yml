name: CI

on:
  push:
  pull_request:

jobs:
  web:
    name: Web CI (${{ matrix.project }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: [main-site, admin-worker-site]
    defaults:
      run:
        shell: bash
        working-directory: ${{ matrix.project }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ${{ matrix.project }}/package-lock.json

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Lint
        run: npm run lint

      - name: Test with coverage
        run: npm test

      - name: Enforce coverage threshold
        run: |
          node -e '
            const fs = require("fs");
            const path = "coverage/coverage-summary.json";
            if (!fs.existsSync(path)) {
              console.error("Coverage summary not found");
              process.exit(1);
            }
            const data = JSON.parse(fs.readFileSync(path));
            const pct = data.total?.statements?.pct ?? data.total?.lines?.pct ?? 0;
            if (pct < 70) {
              console.error(`Coverage too low: ${pct}% < 70%`);
              process.exit(1);
            }
            console.log(`Coverage OK: ${pct}% >= 70%`);
          '

      - name: Build
        run: npm run build

  preview:
    name: PR Preview Deployment
    needs: web
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: main-site/package-lock.json

      - name: Install dependencies
        working-directory: main-site
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build preview
        working-directory: main-site
        run: npm run build

      - name: Deploy preview to GitHub Pages path
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./main-site/dist
          destination_dir: previews/pr-${{ github.event.pull_request.number }}
          keep_files: true

      - name: Comment preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const previewUrl = `https://${context.repo.owner}.github.io/${context.repo.repo}/previews/pr-${context.payload.pull_request.number}/`;
            const marker = '<!-- preview-link-comment -->';
            const body = `${marker}\nPreview deployment is ready: ${previewUrl}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  notify-failure:
    name: Failure Email Notification
    needs: [web, preview]
    if: always() && (needs.web.result == 'failure' || needs.preview.result == 'failure')
    runs-on: ubuntu-latest

    steps:
      - name: Check SMTP configuration
        id: mailcfg
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          CI_ALERT_EMAIL_TO: ${{ secrets.CI_ALERT_EMAIL_TO }}
        run: |
          if [ -n "$SMTP_SERVER" ] && [ -n "$SMTP_USERNAME" ] && [ -n "$SMTP_PASSWORD" ] && [ -n "$CI_ALERT_EMAIL_TO" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Send email on failure
        if: steps.mailcfg.outputs.enabled == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: 587
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "CI/CD failed for ${{ github.repository }} (${{ github.ref_name }})"
          to: ${{ secrets.CI_ALERT_EMAIL_TO }}
          from: ${{ secrets.SMTP_USERNAME }}
          secure: false
          body: |
            A CI/CD workflow failed.

            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Workflow: ${{ github.workflow }}
            Run URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Missing SMTP secrets
        if: steps.mailcfg.outputs.enabled != 'true'
        run: |
          echo "Workflow failed, but SMTP secrets are missing."
          echo "Set SMTP_SERVER, SMTP_USERNAME, SMTP_PASSWORD and CI_ALERT_EMAIL_TO."
